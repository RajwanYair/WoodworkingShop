<svg xmlns="http://www.w3.org/2000/svg" width="1650" height="1300" viewBox="0 0 1650 1300">
  <defs>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #1f2937; }
      .sub { font: 700 15px Arial, sans-serif; fill: #1f2937; }
      .lbl { font: 600 12px Arial, sans-serif; fill: #1e3a8a; }
      .txt { font: 12px Arial, sans-serif; fill: #334155; }
      .dim { font: 11px Arial, sans-serif; fill: #475569; }
      .outline { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; }
      .panel { fill: #e2e8f0; stroke: #0f172a; stroke-width: 1.5; }
      .shelf { fill: #cbd5e1; stroke: #0f172a; stroke-width: 1.2; }
      .door { fill: #fee2e2; stroke: #991b1b; stroke-width: 1.5; }
      .back { fill: #fef3c7; stroke: #92400e; stroke-width: 1.5; }
      .hidden { fill: none; stroke: #64748b; stroke-width: 1; stroke-dasharray: 5 4; }
      .dimline { stroke: #475569; stroke-width: 1; }
      .dimtick { stroke: #475569; stroke-width: 1; }
      .guide { stroke: #94a3b8; stroke-width: 0.8; stroke-dasharray: 2 2; }
      .hinge { fill: #dc2626; }
      .pin { fill: #059669; stroke: #059669; stroke-width: 0.5; }
    </style>
  </defs>

  <!-- Scale: 1:4  (1 mm = 0.25 px)  Large cabinet 2000×1000×600 -->
  <!-- Derived: H=500, W=250, D=150. Panel=4.25 px (17 mm). Back=1 px (4 mm). -->

  <text x="40" y="36" class="title">Large Pantry Cabinet — 2D Orthographic Views (1 : 4)</text>
  <text x="40" y="58" class="txt">Overall: 2000 H × 1000 W × 600 D mm | 17 mm plywood | 4 mm back | 3 mm outer reveal / 2 mm center gap</text>

  <!-- ===== FRONT ELEVATION (doors closed) ===== -->
  <g transform="translate(60,110)">
    <text x="0" y="-16" class="sub">A — Front Elevation (doors closed)</text>
    <rect x="0" y="0" width="250" height="500" class="outline"/>
    <!-- center gap guide -->
    <line x1="125" y1="0" x2="125" y2="500" class="guide"/>
    <!-- doors: 1994×496 → 498.5×124 each; reveal 3mm→0.75px outer, 2mm→0.5px center -->
    <rect x="0.75" y="0.75" width="124" height="498.5" class="door"/>
    <text x="42" y="254" class="lbl">L-06</text>
    <rect x="125.25" y="0.75" width="124" height="498.5" class="door"/>
    <text x="158" y="254" class="lbl">L-06</text>
    <!-- hinge indicators (4 per door, left door, hinge-side = left edge) -->
    <circle cx="6" cy="25" r="3" class="hinge"/><text x="14" y="28" class="dim">H1 100</text>
    <circle cx="6" cy="174.5" r="3" class="hinge"/><text x="14" y="177" class="dim">H2 698</text>
    <circle cx="6" cy="324" r="3" class="hinge"/><text x="14" y="327" class="dim">H3 1296</text>
    <circle cx="6" cy="473.5" r="3" class="hinge"/><text x="14" y="476" class="dim">H4 1894</text>
    <!-- right door hinges (right edge) -->
    <circle cx="244" cy="25" r="3" class="hinge"/>
    <circle cx="244" cy="174.5" r="3" class="hinge"/>
    <circle cx="244" cy="324" r="3" class="hinge"/>
    <circle cx="244" cy="473.5" r="3" class="hinge"/>
    <!-- Width dimension -->
    <line x1="0" y1="524" x2="250" y2="524" class="dimline"/>
    <line x1="0" y1="518" x2="0" y2="530" class="dimtick"/>
    <line x1="250" y1="518" x2="250" y2="530" class="dimtick"/>
    <text x="108" y="540" class="dim">1000</text>
    <!-- Height dimension -->
    <line x1="-26" y1="0" x2="-26" y2="500" class="dimline"/>
    <line x1="-32" y1="0" x2="-20" y2="0" class="dimtick"/>
    <line x1="-32" y1="500" x2="-20" y2="500" class="dimtick"/>
    <text x="-48" y="258" class="dim" transform="rotate(-90 -48,258)">2000</text>
  </g>

  <!-- ===== FRONT ELEVATION (open, carcass interior) ===== -->
  <g transform="translate(420,110)">
    <text x="0" y="-16" class="sub">B — Front Elevation (open)</text>
    <rect x="0" y="0" width="250" height="500" class="outline"/>
    <!-- side panels L-01 -->
    <rect x="0" y="0" width="4.25" height="500" class="panel"/>
    <text x="6" y="256" class="lbl" transform="rotate(-90 6,256)">L-01</text>
    <rect x="245.75" y="0" width="4.25" height="500" class="panel"/>
    <!-- top L-02 -->
    <rect x="4.25" y="0" width="241.5" height="4.25" class="panel"/>
    <text x="110" y="14" class="lbl">L-02</text>
    <!-- bottom L-03 -->
    <rect x="4.25" y="495.75" width="241.5" height="4.25" class="panel"/>
    <text x="110" y="494" class="lbl">L-03</text>
    <!-- fixed shelf L-04 at mid-height (y=250-2.125) -->
    <rect x="4.25" y="245.875" width="241.5" height="4.25" class="shelf"/>
    <text x="96" y="244" class="lbl">L-04 fixed shelf</text>
    <!-- adjustable shelves L-05 (dashed, 4 positions shown) -->
    <line x1="4.25" y1="100" x2="245.75" y2="100" class="hidden"/>
    <text x="172" y="97" class="dim">L-05</text>
    <line x1="4.25" y1="170" x2="245.75" y2="170" class="hidden"/>
    <text x="172" y="167" class="dim">L-05</text>
    <line x1="4.25" y1="330" x2="245.75" y2="330" class="hidden"/>
    <text x="172" y="327" class="dim">L-05</text>
    <line x1="4.25" y1="400" x2="245.75" y2="400" class="hidden"/>
    <text x="172" y="397" class="dim">L-05</text>
    <!-- shelf pin columns (green dots along side panels) -->
    <line x1="13.5" y1="24" x2="13.5" y2="240" class="pin" stroke-dasharray="2 6"/>
    <line x1="13.5" y1="256" x2="13.5" y2="476" class="pin" stroke-dasharray="2 6"/>
    <line x1="236.5" y1="24" x2="236.5" y2="240" class="pin" stroke-dasharray="2 6"/>
    <line x1="236.5" y1="256" x2="236.5" y2="476" class="pin" stroke-dasharray="2 6"/>
    <text x="16" y="20" class="dim" fill="#059669">pin cols</text>
    <!-- Internal width dimension -->
    <line x1="4.25" y1="524" x2="245.75" y2="524" class="dimline"/>
    <line x1="4.25" y1="518" x2="4.25" y2="530" class="dimtick"/>
    <line x1="245.75" y1="518" x2="245.75" y2="530" class="dimtick"/>
    <text x="108" y="540" class="dim">966</text>
  </g>

  <!-- ===== LEFT SIDE ELEVATION ===== -->
  <g transform="translate(800,110)">
    <text x="0" y="-16" class="sub">C — Left Side Elevation</text>
    <rect x="0" y="0" width="150" height="500" class="panel"/>
    <text x="60" y="256" class="lbl">L-01</text>
    <!-- hidden internal lines: top, bottom, fixed shelf, adj shelves -->
    <line x1="5" y1="4.25" x2="145" y2="4.25" class="hidden"/>
    <line x1="5" y1="495.75" x2="145" y2="495.75" class="hidden"/>
    <line x1="5" y1="248" x2="145" y2="248" class="hidden"/>
    <line x1="5" y1="100" x2="140" y2="100" class="hidden"/>
    <line x1="5" y1="170" x2="140" y2="170" class="hidden"/>
    <line x1="5" y1="330" x2="140" y2="330" class="hidden"/>
    <line x1="5" y1="400" x2="140" y2="400" class="hidden"/>
    <!-- shelf depth marker -->
    <line x1="145" y1="100" x2="145" y2="400" class="guide"/>
    <text x="113" y="265" class="dim">580 deep</text>
    <!-- back panel (1px from right edge) -->
    <rect x="149" y="2.5" width="1" height="495" class="back"/>
    <!-- dimensions -->
    <line x1="0" y1="524" x2="150" y2="524" class="dimline"/>
    <line x1="0" y1="518" x2="0" y2="530" class="dimtick"/>
    <line x1="150" y1="518" x2="150" y2="530" class="dimtick"/>
    <text x="60" y="540" class="dim">600</text>
    <line x1="-26" y1="0" x2="-26" y2="500" class="dimline"/>
    <line x1="-32" y1="0" x2="-20" y2="0" class="dimtick"/>
    <line x1="-32" y1="500" x2="-20" y2="500" class="dimtick"/>
    <text x="-48" y="258" class="dim" transform="rotate(-90 -48,258)">2000</text>
  </g>

  <!-- ===== BACK ELEVATION ===== -->
  <g transform="translate(1080,110)">
    <text x="0" y="-16" class="sub">D — Back Elevation</text>
    <rect x="0" y="0" width="250" height="500" class="outline"/>
    <!-- back panel inset 10mm → 2.5px per edge -->
    <rect x="2.5" y="2.5" width="245" height="495" class="back"/>
    <text x="72" y="250" class="lbl">L-07 back 1980 × 980 × 4</text>
    <line x1="0" y1="524" x2="250" y2="524" class="dimline"/>
    <line x1="0" y1="518" x2="0" y2="530" class="dimtick"/>
    <line x1="250" y1="518" x2="250" y2="530" class="dimtick"/>
    <text x="108" y="540" class="dim">1000</text>
  </g>

  <!-- ===== TOP VIEW ===== -->
  <g transform="translate(60,740)">
    <text x="0" y="-16" class="sub">E — Top View (plan)</text>
    <rect x="0" y="0" width="250" height="150" class="outline"/>
    <!-- sides -->
    <rect x="0" y="0" width="4.25" height="150" class="panel"/>
    <rect x="245.75" y="0" width="4.25" height="150" class="panel"/>
    <!-- top panel -->
    <rect x="4.25" y="0" width="241.5" height="150" class="shelf" opacity="0.25"/>
    <text x="80" y="80" class="lbl">L-02 top 966 × 600</text>
    <!-- back panel line -->
    <line x1="0" y1="149" x2="250" y2="149" class="back" stroke-width="1"/>
    <text x="164" y="146" class="dim">back</text>
    <!-- dimensions -->
    <line x1="0" y1="174" x2="250" y2="174" class="dimline"/>
    <line x1="0" y1="168" x2="0" y2="180" class="dimtick"/>
    <line x1="250" y1="168" x2="250" y2="180" class="dimtick"/>
    <text x="108" y="190" class="dim">1000</text>
    <line x1="274" y1="0" x2="274" y2="150" class="dimline"/>
    <line x1="268" y1="0" x2="280" y2="0" class="dimtick"/>
    <line x1="268" y1="150" x2="280" y2="150" class="dimtick"/>
    <text x="286" y="80" class="dim" transform="rotate(-90 286,80)">600</text>
  </g>

  <!-- ===== BOTTOM VIEW ===== -->
  <g transform="translate(420,740)">
    <text x="0" y="-16" class="sub">F — Bottom View</text>
    <rect x="0" y="0" width="250" height="150" class="outline"/>
    <rect x="4.25" y="0" width="241.5" height="150" class="shelf" opacity="0.25"/>
    <text x="62" y="80" class="lbl">L-03 bottom 966 × 600</text>
  </g>

  <!-- ===== RIGHT SIDE ELEVATION ===== -->
  <g transform="translate(800,740)">
    <text x="0" y="-16" class="sub">G — Right Side Elevation</text>
    <rect x="0" y="0" width="150" height="500" class="panel"/>
    <text x="60" y="256" class="lbl">L-01</text>
    <line x1="5" y1="4.25" x2="145" y2="4.25" class="hidden"/>
    <line x1="5" y1="495.75" x2="145" y2="495.75" class="hidden"/>
    <line x1="5" y1="248" x2="145" y2="248" class="hidden"/>
    <line x1="5" y1="100" x2="140" y2="100" class="hidden"/>
    <line x1="5" y1="170" x2="140" y2="170" class="hidden"/>
    <line x1="5" y1="330" x2="140" y2="330" class="hidden"/>
    <line x1="5" y1="400" x2="140" y2="400" class="hidden"/>
    <rect x="0" y="2.5" width="1" height="495" class="back"/>
  </g>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(1080,740)">
    <text x="0" y="-16" class="sub">Legend</text>
    <rect x="0" y="0" width="360" height="260" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2" rx="4"/>
    <rect x="16" y="18" width="16" height="12" class="panel"/>
    <text x="40" y="28" class="txt">Carcass panel (17 mm plywood)</text>
    <rect x="16" y="42" width="16" height="12" class="shelf"/>
    <text x="40" y="52" class="txt">Shelf (fixed or adjustable)</text>
    <rect x="16" y="66" width="16" height="12" class="door"/>
    <text x="40" y="76" class="txt">Door panel</text>
    <rect x="16" y="90" width="16" height="12" class="back"/>
    <text x="40" y="100" class="txt">Back panel (4 mm)</text>
    <circle cx="24" cy="120" r="3" class="hinge"/>
    <text x="40" y="124" class="txt">Hinge cup position (red)</text>
    <line x1="16" y1="138" x2="32" y2="138" class="pin" stroke-dasharray="2 4"/>
    <text x="40" y="142" class="txt">Shelf-pin column (green)</text>
    <line x1="16" y1="160" x2="32" y2="160" class="hidden"/>
    <text x="40" y="164" class="txt">Hidden / adjustable element</text>
    <text x="16" y="200" class="txt">Scale 1 : 4 (1 mm = 0.25 px)</text>
    <text x="16" y="220" class="txt">Dimensions in mm</text>
    <text x="16" y="240" class="txt">Hinge distances measured from top of door</text>
  </g>
</svg>