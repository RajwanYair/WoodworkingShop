<text x="354" y="22.0" text-anchor="middle" font-size="15" font-weight="700" fill="#5a4218">Signature Features</text>
<rect x="1" y="33" width="707" height="29" fill="#5a4218" rx="4"/>
<rect x="1" y="58" width="707" height="4" fill="#5a4218"/>
<text x="114" y="52.0" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Feature</text>
<text x="468" y="52.0" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Why it matters</text>
<rect x="1" y="62" width="707" height="29" fill="#ffffff"/>
<line x1="1" y1="91" x2="708" y2="91" stroke="#d4c4a0" stroke-width="0.5"/>
<text x="13" y="81.0" font-size="13" font-weight="400" fill="#2d2d2d">404 mm reduced depth</text>
<text x="240" y="81.0" font-size="13" font-weight="400" fill="#2d2d2d">Saves one structural sheet while staying practical for daily pantry goods</text>
<line x1="228" y1="62" x2="228" y2="91" stroke="#d4c4a0" stroke-width="0.5"/>
<rect x="1" y="91" width="707" height="29" fill="#f8f4ee"/>
<line x1="1" y1="120" x2="708" y2="120" stroke="#d4c4a0" stroke-width="0.5"/>
<text x="13" y="110.0" font-size="13" font-weight="400" fill="#2d2d2d">Minimal finishing strategy</text>
<text x="240" y="110.0" font-size="13" font-weight="400" fill="#2d2d2d">Raw carcass edges reduce labor and finishing cost</text>
<line x1="228" y1="91" x2="228" y2="120" stroke="#d4c4a0" stroke-width="0.5"/>
<rect x="1" y="120" width="707" height="29" fill="#ffffff"/>
<line x1="1" y1="149" x2="708" y2="149" stroke="#d4c4a0" stroke-width="0.5"/>
<text x="13" y="139.1" font-size="13" font-weight="400" fill="#2d2d2d">Shared joinery with Plan A</text>
<text x="240" y="139.1" font-size="13" font-weight="400" fill="#2d2d2d">Keeps drilling, screw layout, and hinge setup familiar</text>
<line x1="228" y1="120" x2="228" y2="149" stroke="#d4c4a0" stroke-width="0.5"/>
<rect x="1" y="149" width="707" height="29" fill="#f8f4ee"/>
<text x="13" y="168.1" font-size="13" font-weight="400" fill="#2d2d2d">Single material family</text>
<text x="240" y="168.1" font-size="13" font-weight="400" fill="#2d2d2d">Keeps machining, fastening, and finishing consistent with Plan A</text>
<line x1="228" y1="149" x2="228" y2="178" stroke="#d4c4a0" stroke-width="0.5"/>
<rect x="1" y="33" width="707" height="145" fill="none" stroke="#d4c4a0" stroke-width="1" rx="4"/>
