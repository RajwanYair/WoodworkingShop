<svg xmlns="http://www.w3.org/2000/svg" width="659" height="208" viewBox="0 0 659 208">
<style>text{font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}</style>
<text x="330" y="22.0" text-anchor="middle" font-size="15" font-weight="700" fill="#5a4218">Why Not a Python Backend?</text>
<rect x="1" y="33" width="657" height="29" fill="#5a4218" rx="4"/>
<rect x="1" y="58" width="657" height="4" fill="#5a4218"/>
<text x="103" y="52.0" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Consideration</text>
<text x="318" y="52.0" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Client-Side (✅ chosen)</text>
<text x="545" y="52.0" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Python Backend</text>
<rect x="1" y="62" width="657" height="29" fill="#ffffff"/>
<line x1="1" y1="91" x2="658" y2="91" stroke="#d4c4a0" stroke-width="0.5"/>
<text x="13" y="81.0" font-size="13" font-weight="400" fill="#2d2d2d">Hosting cost</text>
<text x="216" y="81.0" font-size="13" font-weight="400" fill="#2d2d2d">Free (GitHub Pages)</text>
<line x1="204" y1="62" x2="204" y2="91" stroke="#d4c4a0" stroke-width="0.5"/>
<text x="443" y="81.0" font-size="13" font-weight="400" fill="#2d2d2d">Needs Vercel/Railway/etc.</text>
<line x1="431" y1="62" x2="431" y2="91" stroke="#d4c4a0" stroke-width="0.5"/>
<rect x="1" y="91" width="657" height="29" fill="#f8f4ee"/>
<line x1="1" y1="120" x2="658" y2="120" stroke="#d4c4a0" stroke-width="0.5"/>
<text x="13" y="110.0" font-size="13" font-weight="400" fill="#2d2d2d">Latency</text>
<text x="216" y="110.0" font-size="13" font-weight="400" fill="#2d2d2d">Instant (runs in browser)</text>
<line x1="204" y1="91" x2="204" y2="120" stroke="#d4c4a0" stroke-width="0.5"/>
<text x="443" y="110.0" font-size="13" font-weight="400" fill="#2d2d2d">Network round-trip per PDF</text>
<line x1="431" y1="91" x2="431" y2="120" stroke="#d4c4a0" stroke-width="0.5"/>
<rect x="1" y="120" width="657" height="29" fill="#ffffff"/>
<line x1="1" y1="149" x2="658" y2="149" stroke="#d4c4a0" stroke-width="0.5"/>
<text x="13" y="139.1" font-size="13" font-weight="400" fill="#2d2d2d">Offline capable</text>
<text x="216" y="139.1" font-size="13" font-weight="400" fill="#2d2d2d">Yes (PWA possible)</text>
<line x1="204" y1="120" x2="204" y2="149" stroke="#d4c4a0" stroke-width="0.5"/>
<text x="443" y="139.1" font-size="13" font-weight="400" fill="#2d2d2d">No</text>
<line x1="431" y1="120" x2="431" y2="149" stroke="#d4c4a0" stroke-width="0.5"/>
<rect x="1" y="149" width="657" height="29" fill="#f8f4ee"/>
<line x1="1" y1="178" x2="658" y2="178" stroke="#d4c4a0" stroke-width="0.5"/>
<text x="13" y="168.1" font-size="13" font-weight="400" fill="#2d2d2d">Reuse of ReportLab code</text>
<text x="216" y="168.1" font-size="13" font-weight="400" fill="#2d2d2d">Must port to TS</text>
<line x1="204" y1="149" x2="204" y2="178" stroke="#d4c4a0" stroke-width="0.5"/>
<text x="443" y="168.1" font-size="13" font-weight="400" fill="#2d2d2d">Direct reuse</text>
<line x1="431" y1="149" x2="431" y2="178" stroke="#d4c4a0" stroke-width="0.5"/>
<rect x="1" y="178" width="657" height="29" fill="#ffffff"/>
<text x="13" y="197.1" font-size="13" font-weight="400" fill="#2d2d2d">Complexity</text>
<text x="216" y="197.1" font-size="13" font-weight="400" fill="#2d2d2d">Single repo, single deploy</text>
<line x1="204" y1="178" x2="204" y2="207" stroke="#d4c4a0" stroke-width="0.5"/>
<text x="443" y="197.1" font-size="13" font-weight="400" fill="#2d2d2d">Two deploys, CORS, auth</text>
<line x1="431" y1="178" x2="431" y2="207" stroke="#d4c4a0" stroke-width="0.5"/>
<rect x="1" y="33" width="657" height="174" fill="none" stroke="#d4c4a0" stroke-width="1" rx="4"/>
</svg>