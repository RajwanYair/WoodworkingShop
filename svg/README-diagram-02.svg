<svg xmlns="http://www.w3.org/2000/svg" width="721" height="496" viewBox="0 0 721 496">
<style>text{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;white-space:pre}</style>
<text x="361" y="22.0" text-anchor="middle" font-size="15" font-weight="700" fill="#5a4218" style="font-family:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">Project Structure</text>
<rect x="1" y="33" width="719" height="462" fill="#f6f1ea" rx="6" stroke="#d4c4a0" stroke-width="1"/>
<rect x="1" y="33" width="4" height="462" fill="#5a4218" rx="2"/>
<text x="24" y="67.4" font-size="12" fill="#2d2d2d">src/</text>
<text x="24" y="86.6" font-size="12" fill="#2d2d2d">  engine/           # Pure TypeScript calculation engine</text>
<text x="24" y="105.8" font-size="12" fill="#2d2d2d">    types.ts        # Domain types (CabinetConfig, Part, etc.)</text>
<text x="24" y="125.0" font-size="12" fill="#2d2d2d">    materials.ts    # Material database, defaults, constraints, prices</text>
<text x="24" y="144.2" font-size="12" fill="#2d2d2d">    dimensions.ts   # Derived dimensions from config</text>
<text x="24" y="163.4" font-size="12" fill="#2d2d2d">    parts.ts        # Parts list generation</text>
<text x="24" y="182.6" font-size="12" fill="#2d2d2d">    hardware.ts     # Hardware BOM generation</text>
<text x="24" y="201.8" font-size="12" fill="#2d2d2d">    cut-optimizer.ts    # FFD 2D bin-packing</text>
<text x="24" y="221.0" font-size="12" fill="#2d2d2d">    smart-optimizer.ts  # 5-strategy optimization engine</text>
<text x="24" y="240.2" font-size="12" fill="#2d2d2d">    cost-estimator.ts   # Price calculation engine</text>
<text x="24" y="259.4" font-size="12" fill="#2d2d2d">  components/</text>
<text x="24" y="278.6" font-size="12" fill="#2d2d2d">    layout/         # Header, Sidebar (with cost estimate)</text>
<text x="24" y="297.8" font-size="12" fill="#2d2d2d">    configurator/   # DimensionSliders, MaterialSelector, DoorConfig, SaveLoad, CostEstimate</text>
<text x="24" y="317.0" font-size="12" fill="#2d2d2d">    preview/        # CabinetPreview (SVG with draggable shelves)</text>
<text x="24" y="336.2" font-size="12" fill="#2d2d2d">    optimizer/      # OptimizerView (interactive), SmartOptimizerPanel, ComparisonView, Tables</text>
<text x="24" y="355.4" font-size="12" fill="#2d2d2d">    pdf/            # CabinetPdfDocument (8+ pages), PdfExportPanel</text>
<text x="24" y="374.6" font-size="12" fill="#2d2d2d">  store/            # Zustand store (cabinet-store.ts)</text>
<text x="24" y="393.8" font-size="12" fill="#2d2d2d">  utils/            # URL state, localStorage helpers</text>
<text x="24" y="413.0" font-size="12" fill="#2d2d2d">  i18n/             # en.json, he.json</text>
<text x="24" y="432.2" font-size="12" fill="#2d2d2d">tests/</text>
<text x="24" y="451.4" font-size="12" fill="#2d2d2d">  engine/           # Unit tests for engine modules + smart optimizer</text>
<text x="24" y="470.6" font-size="12" fill="#2d2d2d">  utils/            # URL state round-trip tests</text>
</svg>