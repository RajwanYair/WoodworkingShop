<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cabinet Planner — Redirecting</title>
    <script>
      // SPA redirect: GitHub Pages serves 404.html for unknown paths.
      // Redirect to index with the path as a query param so the SPA can handle routing.
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        window.location.origin + '/WoodworkingShop/' +
        '?p=' + encodeURIComponent(path.replace('/WoodworkingShop/', '')) +
        (search ? '&' + search.slice(1) : '') +
        hash
      );
    </script>
  </head>
  <body>
    <p>Redirecting&hellip;</p>
  </body>
</html>
