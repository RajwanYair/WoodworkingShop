name: Release — Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build SPA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality checks
        run: npm run ci

      - name: Create dist archive + checksums
        run: |
          cd dist
          tar -czf ../woodworkingshop-dist.tar.gz .
          cd ..
          sha256sum woodworkingshop-dist.tar.gz > woodworkingshop-dist.tar.gz.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: woodworkingshop-dist
          path: |
            woodworkingshop-dist.tar.gz
            woodworkingshop-dist.tar.gz.sha256

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: woodworkingshop-dist

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog
        id: changelog
        run: |
          VER="${{ steps.version.outputs.version }}"
          VER="${VER#v}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \\[${VER}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${VER}"
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: WoodworkingShop ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            woodworkingshop-dist.tar.gz
            woodworkingshop-dist.tar.gz.sha256
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            ### Artifacts
            - **woodworkingshop-dist.tar.gz** — Production build of the SPA (deploy to any static host)

            ### Run locally
            ```bash
            npm ci
            npm run dev
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
