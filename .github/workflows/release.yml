name: Release — Build PDFs & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build PDF Catalog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system fonts (Arial)
        run: |
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections
          sudo apt-get update -qq
          sudo apt-get install -y -qq ttf-mscorefonts-installer
          sudo fc-cache -f

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate all PDFs
        run: |
          python pantry-cabinet-plans/plan-a/generate_plan_a_pdfs.py
          python pantry-cabinet-plans/plan-b/generate_plan_b_pdfs.py
          python pantry-cabinet-plans/plan-c/generate_plan_c_pdfs.py
          python pantry-cabinet-plans/generate_unified_optimized_plans.py

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          cp pantry-cabinet-plans/plan-a/large-cabinet/*.pdf release-artifacts/
          cp pantry-cabinet-plans/plan-a/small-cabinet/*.pdf release-artifacts/
          cp pantry-cabinet-plans/plan-b/large-cabinet/*.pdf release-artifacts/
          cp pantry-cabinet-plans/plan-b/small-cabinet/*.pdf release-artifacts/
          cp pantry-cabinet-plans/plan-c/*.pdf release-artifacts/
          cp pantry-cabinet-plans/unified-optimized/*.pdf release-artifacts/
          ls -la release-artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pantry-cabinet-catalog
          path: release-artifacts/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: pantry-cabinet-catalog
          path: release-artifacts/

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Pantry Cabinet Plans ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: release-artifacts/*
          body: |
            ## Pantry Cabinet Plans — Catalog Release

            All plans generate bilingual EN/HE PDFs from source data.
            PDFs attached to this release were built fresh from the tagged commit.

            ### Included Plans
            | Plan | Depth | 17 mm Sheets | Layout |
            |------|-------|-------------|--------|
            | **A** | 600 mm | 5 | Per-cabinet (large + small) |
            | **B** | 404 mm | 4 | Per-cabinet (large + small) |
            | **C** | 368 mm | 3 | Combined double-cabinet |
            | **Unified** | All | — | Cross-plan comparison |

            ### How to regenerate locally
            ```bash
            pip install -r requirements.txt
            python pantry-cabinet-plans/plan-a/generate_plan_a_pdfs.py
            python pantry-cabinet-plans/plan-b/generate_plan_b_pdfs.py
            python pantry-cabinet-plans/plan-c/generate_plan_c_pdfs.py
            python pantry-cabinet-plans/generate_unified_optimized_plans.py
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
