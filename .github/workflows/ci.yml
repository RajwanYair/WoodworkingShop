name: CI — Generate & Verify PDFs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-pdfs:
    name: Generate PDFs (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Plan A PDFs
        run: python pantry-cabinet-plans/plan-a/generate_plan_a_pdfs.py

      - name: Generate Plan B PDFs
        run: python pantry-cabinet-plans/plan-b/generate_plan_b_pdfs.py

      - name: Generate Plan C PDFs
        run: python pantry-cabinet-plans/plan-c/generate_plan_c_pdfs.py

      - name: Generate Unified PDFs
        run: python pantry-cabinet-plans/generate_unified_optimized_plans.py

      - name: Verify all PDFs exist
        run: |
          set -e
          for f in \
            pantry-cabinet-plans/plan-a/large-cabinet/Large_Pantry_Cabinet_Plan_A_EN.pdf \
            pantry-cabinet-plans/plan-a/large-cabinet/Large_Pantry_Cabinet_Plan_A_HE.pdf \
            pantry-cabinet-plans/plan-a/small-cabinet/Small_Pantry_Cabinet_Plan_A_EN.pdf \
            pantry-cabinet-plans/plan-a/small-cabinet/Small_Pantry_Cabinet_Plan_A_HE.pdf \
            pantry-cabinet-plans/plan-b/large-cabinet/Large_Pantry_Cabinet_Plan_B_EN.pdf \
            pantry-cabinet-plans/plan-b/large-cabinet/Large_Pantry_Cabinet_Plan_B_HE.pdf \
            pantry-cabinet-plans/plan-b/small-cabinet/Small_Pantry_Cabinet_Plan_B_EN.pdf \
            pantry-cabinet-plans/plan-b/small-cabinet/Small_Pantry_Cabinet_Plan_B_HE.pdf \
            pantry-cabinet-plans/plan-c/Double_Pantry_Cabinet_Plan_C_EN.pdf \
            pantry-cabinet-plans/plan-c/Double_Pantry_Cabinet_Plan_C_HE.pdf \
            pantry-cabinet-plans/unified-optimized/Unified_Pantry_Cabinet_Plans_A_B_C_EN.pdf \
            pantry-cabinet-plans/unified-optimized/Unified_Pantry_Cabinet_Plans_A_B_C_HE.pdf; do
            [ -f "$f" ] && echo "✓ $f" || { echo "✗ MISSING: $f"; exit 1; }
          done
          echo "All 12 PDFs verified."

      - name: Upload generated PDFs
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: pantry-cabinet-pdfs
          path: |
            pantry-cabinet-plans/plan-a/large-cabinet/*.pdf
            pantry-cabinet-plans/plan-a/small-cabinet/*.pdf
            pantry-cabinet-plans/plan-b/large-cabinet/*.pdf
            pantry-cabinet-plans/plan-b/small-cabinet/*.pdf
            pantry-cabinet-plans/plan-c/*.pdf
            pantry-cabinet-plans/unified-optimized/*.pdf
          retention-days: 14
