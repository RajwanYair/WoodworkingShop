<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/WoodworkingShop/favicon.svg" />
    <link rel="manifest" href="/WoodworkingShop/manifest.json" />
    <meta name="theme-color" content="#5a4218" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive woodworking cabinet design tool with smart cut optimization, PDF export, and bilingual support."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://rajwanyair.github.io/WoodworkingShop/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cabinet Planner — Woodworking Design Tool" />
    <meta
      property="og:description"
      content="Design custom cabinets and bookshelves with smart cut optimization, 3D preview, DXF export, and step-by-step assembly guides."
    />
    <meta property="og:url" content="https://rajwanyair.github.io/WoodworkingShop/" />
    <meta property="og:site_name" content="Cabinet Planner" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Cabinet Planner — Woodworking Design Tool" />
    <meta name="twitter:description" content="Design custom cabinets with smart cut optimization and PDF export." />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Cabinet Planner",
        "description": "Interactive woodworking cabinet design tool with smart cut optimization, 3D preview, DXF export, and bilingual support.",
        "url": "https://rajwanyair.github.io/WoodworkingShop/",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "inLanguage": ["en", "he"]
      }
    </script>

    <title>Cabinet Planner — Woodworking Design Tool</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <p style="text-align: center; padding: 2rem; font-family: system-ui">
        Cabinet Planner requires JavaScript to run. Please enable JavaScript in your browser.
      </p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/WoodworkingShop/sw.js');
        });
      }
    </script>
  </body>
</html>
